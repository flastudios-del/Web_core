<!DOCTYPE html>
<html>
<head>
<title>WEB CORE v0.5</title>

<style>
:root{
 --bg1:#b8ecff; --bg2:#e6fbff; --glass:#ffffffcc; --text:#0a6fbf;
}
.aero{}
.dark{--bg1:#0b1d2a;--bg2:#12364d;--glass:#1e3c5acc;--text:#9fe4ff;}
.mint{--bg1:#c8ffe8;--bg2:#ecfff7;--glass:#ffffffdd;--text:#0a8f6a;}
.sunset{--bg1:#ffd6a5;--bg2:#fff1e0;--glass:#ffffffcc;--text:#b85c00;}
.purple{--bg1:#e0ccff;--bg2:#f5f0ff;--glass:#ffffffcc;--text:#5b2aa8;}

body{
 margin:0;
 font-family:Arial;
 background:linear-gradient(var(--bg1),var(--bg2));
 transition:.4s;
}

/* sidebar */
.side{
 position:fixed;
 left:0; top:0; bottom:0;
 width:170px;
 background:var(--glass);
 padding:12px;
}

.side button{
 width:100%;
 margin:6px 0;
}

/* main */
.main{
 margin-left:190px;
}

.top{
 padding:14px;
 font-size:22px;
 font-weight:bold;
 color:var(--text);
}

.panel{
 width:560px;
 margin:10px auto 60px auto;
}

.card,.post{
 background:var(--glass);
 padding:14px;
 border-radius:18px;
 margin-bottom:14px;
 color:var(--text);
}

textarea,input{
 width:100%;
 padding:8px;
 border-radius:10px;
 border:none;
 margin-top:6px;
}

button{
 padding:8px 12px;
 border:none;
 border-radius:12px;
 background:#9fe4ff;
 font-weight:bold;
 cursor:pointer;
}

.user{font-weight:bold}

.imgreal{
 max-width:100%;
 border-radius:12px;
 margin-top:8px;
}

.comment{
 font-size:14px;
 background:#ffffff88;
 padding:6px;
 border-radius:8px;
 margin-top:6px;
}
.hidden{display:none}
.small{font-size:12px;opacity:.8}
</style>

<script>
let themes=["aero","dark","mint","sunset","purple"];
let themeIndex=0;

function setTheme(i){
 themeIndex=i;
 document.body.className=themes[i];
 localStorage.setItem("wc_theme",i);
}

/* NAV */
function view(id){
 feed.classList.add("hidden");
 profile.classList.add("hidden");
 document.getElementById(id).classList.remove("hidden");
}

/* PROFILE SAVE */
function saveProfile(){
 localStorage.setItem("wc_name",pname.value);
 localStorage.setItem("wc_bio",pbio.value);
 alert("Perfil guardado");
}

/* POST */
function addPost(){
 let t=postText.value.trim();
 if(!t) return;

 let file=imgInput.files[0];
 if(file){
  let r=new FileReader();
  r.onload=()=>makePost(t,r.result);
  r.readAsDataURL(file);
 } else makePost(t,null);
}

function makePost(text,img){
 let data={text, img, comments:[]};
 let arr=getPosts();
 arr.unshift(data);
 localStorage.setItem("wc_posts",JSON.stringify(arr));
 renderPosts();
 postText.value="";
 imgInput.value="";
 notify("Post publicado");
}

/* COMMENTS */
function addComment(i,inp){
 let arr=getPosts();
 arr[i].comments.push(inp.value);
 localStorage.setItem("wc_posts",JSON.stringify(arr));
 renderPosts();
}

/* STORAGE */
function getPosts(){
 return JSON.parse(localStorage.getItem("wc_posts")||"[]");
}

/* RENDER */
function renderPosts(){
 let arr=getPosts();
 posts.innerHTML="";
 arr.forEach((p,i)=>{
  let d=document.createElement("div");
  d.className="post";
  let html="<div class=user>"+(localStorage.wc_name||"@tu_usuario")+"</div>"+p.text;
  if(p.img) html+="<img class=imgreal src='"+p.img+"'>";
  html+="<div class=small>Comentarios:</div>";
  p.comments.forEach(c=> html+="<div class=comment>"+c+"</div>");
  html+="<input placeholder='comentar' onkeydown=\"if(event.key==='Enter') addComment("+i+",this)\">";
  d.innerHTML=html;
  posts.appendChild(d);
 });
 postCount.innerText=arr.length;
}

/* NOTIFY */
function notify(t){
 notif.innerText=t;
 notif.style.display="block";
 setTimeout(()=>notif.style.display="none",2000);
}

/* INIT */
window.onload=()=>{
 pname.value=localStorage.wc_name||"@tu_usuario";
 pbio.value=localStorage.wc_bio||"bio...";
 let ti=localStorage.wc_theme||0;
 setTheme(ti);
 renderPosts();
}
</script>

</head>

<body class="aero">

<div class="side">
<b>WEB CORE v0.5</b>

<button onclick="view('feed')">Inicio</button>
<button onclick="view('profile')">Perfil</button>

<hr>

Temas:
<button onclick="setTheme(0)">Aero</button>
<button onclick="setTheme(1)">Dark</button>
<button onclick="setTheme(2)">Mint</button>
<button onclick="setTheme(3)">Sunset</button>
<button onclick="setTheme(4)">Purple</button>
</div>

<div class="main">

<div class="top">Red social beta local</div>

<div id="feed" class="panel">

<div class="card">
<textarea id="postText" placeholder="¿Qué publicas hoy?"></textarea>
<input type="file" id="imgInput" accept="image/*">
<br><br>
<button onclick="addPost()">Publicar</button>
</div>

<div id="posts"></div>

</div>

<div id="profile" class="panel hidden">

<div class="card">
Nombre:
<input id="pname">
Bio:
<input id="pbio">
<br><br>
<button onclick="saveProfile()">Guardar perfil</button>
</div>

<div class="card">
Posts creados: <b id="postCount">0</b><br>
Guardado local: ✔️<br>
Imágenes reales: ✔️<br>
Comentarios: ✔️<br>
Versión: v0.5
</div>

</div>

</div>

<div id="notif" style="
position:fixed;
right:20px;
bottom:20px;
background:#000;
color:#fff;
padding:10px;
border-radius:10px;
display:none;
">ok</div>

</body>
</html>
