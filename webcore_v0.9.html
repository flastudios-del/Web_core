<!DOCTYPE html>
<html>
<head>
<title>WEB CORE v0.9</title>

<style>
:root{--bg1:#b8ecff;--bg2:#e6fbff;--glass:#ffffffcc;--text:#0a6fbf}

/* 20 TEMAS */
.aero{}
.dark{--bg1:#0b1d2a;--bg2:#12364d;--glass:#1e3c5acc;--text:#9fe4ff;}
.mint{--bg1:#c8ffe8;--bg2:#ecfff7;--text:#0a8f6a;}
.sunset{--bg1:#ffd6a5;--bg2:#fff1e0;}
.purple{--bg1:#e0ccff;--bg2:#f5f0ff;}
.neon{--bg1:#000;--bg2:#111;--glass:#00ffee22;--text:#00ffee;}
.ice{--bg1:#e6f7ff;--bg2:#ffffff;}
.matrix{--bg1:#000;--bg2:#001100;--glass:#003300cc;--text:#00ff55;}
.candy{--bg1:#ffd1dc;--bg2:#ffeef2;}
.glass{--bg1:#dfe9f3;--bg2:#ffffff;--glass:#ffffff88;}
.ocean{--bg1:#006994;--bg2:#00b4d8;}
.lava{--bg1:#3b0000;--bg2:#ff3c00;}
.forest{--bg1:#0b3d0b;--bg2:#1f7a1f;}
.nightsky{--bg1:#050510;--bg2:#0a0a2a;--text:#aab0ff;}
.retro{--bg1:#f4ecd8;--bg2:#e0c097;}
.cyberblue{--bg1:#001f3f;--bg2:#0074D9;}
.gold{--bg1:#fff6cc;--bg2:#ffd700;}
.gray{--bg1:#ccc;--bg2:#eee;}
.lime{--bg1:#d4ff00;--bg2:#f6ffb3;}
.coral{--bg1:#ff7f50;--bg2:#ffd2c2;}

body{margin:0;font-family:Arial;background:linear-gradient(var(--bg1),var(--bg2));transition:.4s}
.side{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--glass);padding:12px}
.main{margin-left:240px;padding:20px}
.card,.post{background:var(--glass);padding:14px;border-radius:16px;margin-bottom:14px;color:var(--text)}
textarea,input,select{width:100%;padding:8px;border-radius:10px;border:none;margin-top:6px}
button{padding:7px 12px;border:none;border-radius:10px;background:#9fe4ff;font-weight:bold;cursor:pointer;margin-top:6px}
.img{max-width:100%;border-radius:10px;margin-top:8px}
.comment{background:#ffffff88;padding:6px;border-radius:8px;margin-top:6px;font-size:13px}
.hidden{display:none}
.tag{font-size:11px;background:#0002;padding:2px 6px;border-radius:6px;margin-right:4px}
</style>

<script>
/* ---------- USER SYSTEM ---------- */
function currentUser(){return localStorage.wc_user||"guest"}
function setUser(u){localStorage.wc_user=u; location.reload()}

/* ---------- STORAGE PER USER ---------- */
const key=p=> currentUser()+"_"+p;
const GP=()=>JSON.parse(localStorage[key("posts")]||"[]");
const SP=a=>localStorage[key("posts")]=JSON.stringify(a);

/* ---------- NAV ---------- */
function view(id){
 feed.classList.add("hidden");
 profile.classList.add("hidden");
 favs.classList.add("hidden");
 chat.classList.add("hidden");
 document.getElementById(id).classList.remove("hidden");
}

/* ---------- THEME ---------- */
function setTheme(){document.body.className=themeSel.value;localStorage.wc_theme=themeSel.value}

/* ---------- PROFILE ---------- */
function saveProfile(){
 localStorage[key("name")]=pname.value;
 localStorage[key("bio")]=pbio.value;
 if(avatarInput.files[0]){
  let r=new FileReader();
  r.onload=()=>localStorage[key("avatar")]=r.result;
  r.readAsDataURL(avatarInput.files[0]);
 }
}

/* ---------- POSTS ---------- */
function addPost(){
 let t=postText.value.trim(); if(!t) return;
 let tags=tagInput.value.split(",").map(x=>x.trim()).filter(Boolean);
 let f=imgInput.files[0];
 if(f){
  let r=new FileReader();
  r.onload=()=>mk(t,r.result,tags);
  r.readAsDataURL(f);
 } else mk(t,null,tags);
}

function mk(t,img,tags){
 let a=GP();
 a.unshift({t,img,tags,likes:0,comments:[],fav:false,pin:false});
 SP(a); render();
 postText.value=""; tagInput.value=""; imgInput.value="";
}

function like(i){let a=GP();a[i].likes++;SP(a);render();}
function fav(i){let a=GP();a[i].fav=!a[i].fav;SP(a);render();}
function pin(i){let a=GP();a[i].pin=!a[i].pin;SP(a);render();}
function delp(i){let a=GP();a.splice(i,1);SP(a);render();}
function editp(i){let a=GP();let n=prompt("Editar",a[i].t); if(n){a[i].t=n;SP(a);render();}}
function com(i,input){if(!input.value)return;let a=GP();a[i].comments.push(input.value);SP(a);render();}

/* ---------- SEARCH ---------- */
function searchPosts(){
 let q=search.value.toLowerCase();
 document.querySelectorAll(".post").forEach(p=>{
  p.style.display=p.innerText.toLowerCase().includes(q)?"block":"none";
 });
}

/* ---------- RENDER ---------- */
function render(){
 let a=GP().sort((x,y)=>y.pin-x.pin);
 posts.innerHTML=""; favPosts.innerHTML="";
 a.forEach((p,i)=>{
  let d=document.createElement("div");
  d.className="post";
  let name=localStorage[key("name")]||currentUser();
  let av=localStorage[key("avatar")]||"";

  let h="";
  if(p.pin) h+="📌 ";
  if(p.fav) h+="⭐ ";
  if(av) h+="<img src='"+av+"' width=40 style='border-radius:50%'><br>";
  h+="<b>"+name+"</b><br>"+p.t;

  p.tags.forEach(t=>h+="<span class=tag>#"+t+"</span>");
  if(p.img) h+="<img class=img src='"+p.img+"'>";

  h+="<div>❤️ "+p.likes+"</div>";
  h+=`<button onclick="like(${i})">Like</button>
      <button onclick="fav(${i})">Fav</button>
      <button onclick="pin(${i})">Pin</button>
      <button onclick="editp(${i})">Edit</button>
      <button onclick="delp(${i})">Del</button>`;

  p.comments.forEach(c=>h+="<div class=comment>"+c+"</div>");
  h+=`<input placeholder="comentar" onkeydown="if(event.key==='Enter') com(${i},this)">`;

  d.innerHTML=h;
  posts.appendChild(d);
  if(p.fav) favPosts.appendChild(d.cloneNode(true));
 });

 statPosts.innerText=a.length;
 statFav.innerText=a.filter(x=>x.fav).length;
}

/* ---------- CHAT ROOMS DEMO ---------- */
function sendMsg(){
 if(!msg.value) return;
 let d=document.createElement("div");
 d.textContent=currentUser()+": "+msg.value;
 chatlog.appendChild(d);
 msg.value="";
}

/* ---------- INIT ---------- */
window.onload=()=>{
 userLabel.innerText=currentUser();
 pname.value=localStorage[key("name")]||"";
 pbio.value=localStorage[key("bio")]||"";
 themeSel.value=localStorage.wc_theme||"aero";
 setTheme();
 render();
}
</script>

</head>

<body class="aero">

<div class="side">

<b>WEB CORE v0.9</b>

<div>Usuario: <b id="userLabel"></b></div>
<input placeholder="cambiar usuario" id="userNew">
<button onclick="setUser(userNew.value)">Entrar</button>

<hr>

<button onclick="view('feed')">Inicio</button>
<button onclick="view('favs')">Favoritos</button>
<button onclick="view('profile')">Perfil</button>
<button onclick="view('chat')">Chat</button>

<hr>

<select id="themeSel" onchange="setTheme()">
<option>aero</option><option>dark</option><option>mint</option>
<option>sunset</option><option>purple</option><option>neon</option>
<option>ice</option><option>matrix</option><option>candy</option>
<option>glass</option><option>ocean</option><option>lava</option>
<option>forest</option><option>nightsky</option><option>retro</option>
<option>cyberblue</option><option>gold</option><option>gray</option>
<option>lime</option><option>coral</option>
</select>

</div>

<div class="main">

<!-- FEED -->
<div id="feed">
<div class="card">
<input id="search" placeholder="buscar" oninput="searchPosts()">
</div>

<div class="card">
<textarea id="postText"></textarea>
<input id="tagInput" placeholder="tags">
<input type="file" id="imgInput">
<button onclick="addPost()">Publicar</button>
</div>

<div id="posts"></div>

<div class="card">
Posts: <b id="statPosts"></b> | Favoritos: <b id="statFav"></b>
</div>
</div>

<!-- FAVORITOS -->
<div id="favs" class="hidden">
<div id="favPosts"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
<div class="card">
<input id="pname" placeholder="nombre">
<input id="pbio" placeholder="bio">
<input type="file" id="avatarInput">
<button onclick="saveProfile()">Guardar perfil</button>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="hidden">
<div class="card">
<div id="chatlog"></div>
<input id="msg" onkeydown="if(event.key==='Enter') sendMsg()">
<button onclick="sendMsg()">Enviar</button>
</div>
</div>

</div>

</body>
</html>
